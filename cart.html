<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" />
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="header">
        <div>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </section>

    <section id="cart" class="section-p1">
        <table width="100%">
            <thead>
                <tr>
                    <td>Loại bỏ</td>
                    <td>Hình ảnh</td>
                    <td>Sản phẩm</td>
                    <td>Giá bán</td>
                    <td>Số lượng</td>
                    <td>Tổng thu</td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><a href="#"><i class="far fa-times-circle"></i></a></td>
                    <td><img src="https://kallos.co/cdn/shop/files/OsullocMatchaPretzel1.jpg?v=1713003852&width=1080" alt="matcha"></td>
                    <td>Pretzel Matcha</td>
                    <td>$10</td>
                    <td><input type="number" value="1"></td>
                    <td>$10</td>
                </tr>
                <tr>
                    <td><a href="#"><i class="far fa-times-circle"></i></a></td>
                    <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyZsbm624iVBewiGrVknee0prSN20QNDEctQ&s" alt="chocolate"></td>
                    <td>Pretzel Chocolate</td>
                    <td>$10</td>
                    <td><input type="number" value="1"></td>
                    <td>$10</td>
                </tr>
                <tr>
                    <td><a href="#"><i class="far fa-times-circle"></i></a></td>
                    <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSjYiZBhAHXJnwRSUBqk0PIYL161NhZOljew&s" alt="org"></td>
                    <td>Pretzel Original</td>
                    <td>$10</td>
                    <td><input type="number" value="1"></td>
                    <td>$10</td>
                </tr>
            </tbody>
        </table>
    </section>

    <section id="cart-add" class="section-p1">
        <div id="coupon">
            <h3>Áp dụng phiếu giảm giá</h3>
            <div>
                <input type="text" placeholder="Nhập mã của bạn">
                <button class="normal">Áp dụng</button>
            </div>
        </div>

        <div id="subtotal">
            <h3>Tổng tiền giỏ hàng</h3>
            <table>
                <tr>
                    <td>Tổng thu</td>
                    <td>$30</td>
                </tr>
                <tr>
                    <td>Phí vận chuyển</td>
                    <td>Miễn phí</td>
                </tr>
                <tr>
                    <td><strong>Tổng cộng</strong></td>
                    <td><strong>$30</strong></td>
                </tr>
            </table>
            <button class="normal">Tiến hành thanh toán</button>
        </div>
    </section>

    <footer class="section-p1">
        </footer>

</body>
</html>
