<!DOCTYPE html>
<html lang="vi">

<body>

<header class="header">
    <div class="container nav">
        <div class="logo">Pretzel<span>House</span></div>
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

<section class="product">
    <div class="container">

        <!-- FILTER giả lập -->

            <button class="btn-primary">Sweet</button>

        <!-- GRID -->
        <div class="product-grid">

            <div class="card">
                <a href="product.html">

            </div>

            <div class="card">

                <img src="assets/img/Chocolate.jpg">

            <div class="card">
                <img src="assets/img/mini.png">

            <div class="card">
                <img src="assets/img/Sweet.jpg">
                <h4>Sweet Pretzel</h4>
                <p>$6.00</p>
            </div>

            <div class="card">
                <img src="assets/img/Salted Twist.jpg">
                <h4>Salted Twist</h4>
                <p>$5.50</p>
            </div>

            <div class="card">
                <img src="assets/img/Crunchy Ring.jpg">

            </div>

            <div class="card">
                <img src="assets/img/Combo.jpg">

            </div>
